<section class="login-page">
  <mat-card class="login-card">
    <mat-card-header><mat-card-title>ICMP Document Workflow</mat-card-title><mat-card-subtitle>Sign in through the API Gateway</mat-card-subtitle></mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline"><mat-label>Username</mat-label><input matInput formControlName="username" autocomplete="username"><mat-icon matSuffix>person</mat-icon></mat-form-field>
        <mat-form-field appearance="outline"><mat-label>Password</mat-label><input matInput type="password" formControlName="password" autocomplete="current-password"><mat-icon matSuffix>lock</mat-icon></mat-form-field>
        <button mat-flat-button color="primary" type="submit" [disabled]="loading()">@if (loading()) { <mat-spinner diameter="20" /> } @else { Sign in }</button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
