<header class="page-header"><h1>Workflow Tracking</h1><p>Poll Saga state and Kafka event progression by request ID.</p></header>
<mat-card class="search-card"><form [formGroup]="form" (ngSubmit)="track()"><mat-form-field appearance="outline"><mat-label>Request ID</mat-label><input matInput formControlName="requestId" placeholder="REQ-..."></mat-form-field><button mat-flat-button color="primary"><mat-icon>search</mat-icon>Track</button></form></mat-card>
@if (loading()) { <app-loading-spinner /> }
@if (status(); as workflow) { <mat-card class="summary"><div><span>Request</span><strong>{{ workflow.requestId }}</strong></div><div><span>Status</span><app-status-badge [status]="workflow.status" /></div><div><span>Saga state</span><strong>{{ workflow.sagaState }}</strong></div><div><span>Current step</span><strong>{{ workflow.currentStep }}</strong></div></mat-card><mat-card><h2>Workflow timeline</h2><app-workflow-timeline [events]="workflow.events" /></mat-card> }
